name: Gerar APK do Cultivar

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔽 Baixar código
        uses: actions/checkout@v4
      
      - name: 📁 Criar estrutura
        run: |
          mkdir -p www
          cp index.html www/
          echo "Estrutura criada com sucesso"
      
      - name: 📦 Instalar PWABuilder
        run: |
          npm install -g @pwabuilder/cli
          echo "PWABuilder instalado"
      
      - name: 📄 Criar manifest.json
        run: |
          cat > manifest.json << 'EOF'
          {
            "name": "Cultivar",
            "short_name": "Cultivar",
            "description": "Gestão Agrícola",
            "start_url": "index.html",
            "display": "standalone",
            "theme_color": "#CD853F",
            "background_color": "#D2B48C",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "192x192",
                "type": "image/png"
              }
            ]
          }
          EOF
          echo "Manifest criado"
      
      - name: 🔨 Gerar APK
        run: |
          pwabuilder build --platform android --manifest manifest.json --output ./
          echo "APK gerado"
      
      - name: 📤 Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: Cultivar-APK
          path: |
            *.apk
            **/*.apk
